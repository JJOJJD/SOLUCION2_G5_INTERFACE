<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaMed Renacer - Chatbot WhatsApp (Paciente)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --primary-light: #ccfbf1;
            --whatsapp-green: #075e54;
            --whatsapp-light: #dcf8c6;
            --bg-neutral: #e5ddd5;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #dadbd3;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Top Demo Info Bar */
        .demo-bar {
            width: 100%;
            max-width: 420px;
            background-color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .demo-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .demo-link:hover {
            text-decoration: underline;
        }

        /* Phone mockup framing */
        .phone-mockup {
            width: 100%;
            max-width: 380px;
            height: 640px;
            background-color: #000;
            border-radius: 36px;
            box-shadow: var(--shadow-md), 0 25px 50px -12px rgb(0 0 0 / 0.25);
            padding: 11px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 4px solid #2d3748;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: cover;
            border-radius: 26px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Phone notch */
        .phone-notch {
            width: 130px;
            height: 18px;
            background-color: #000;
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 100;
        }

        /* WhatsApp Chat Window Headers */
        .chat-header {
            background-color: var(--whatsapp-green);
            padding: 20px 12px 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            z-index: 10;
        }

        .chat-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #eee;
            background-image: url('https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&q=80&w=100');
            background-size: cover;
        }

        .chat-status h3 {
            font-size: 13px;
            font-weight: 600;
        }

        .chat-status p {
            font-size: 10px;
            opacity: 0.8;
        }

        /* Message display body */
        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Chat bubbles */
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .msg-in {
            align-self: flex-start;
            background-color: white;
            color: var(--text-main);
            border-top-left-radius: 0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .msg-out {
            align-self: flex-end;
            background-color: var(--whatsapp-light);
            color: var(--text-main);
            border-top-right-radius: 0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .msg-agent {
            align-self: flex-end;
            background-color: #bbdefb;
            color: var(--text-main);
            border-top-right-radius: 0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .msg-time {
            font-size: 8px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 4px;
            display: block;
        }

        /* Chat Interactive Button Styling */
        .chat-btn-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 8px;
        }

        .chat-interactive-btn {
            background-color: #f8fafc;
            color: var(--whatsapp-green);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .chat-interactive-btn:hover {
            background-color: var(--whatsapp-green);
            color: white;
            border-color: var(--whatsapp-green);
        }

        .chat-interactive-btn.clicked {
            background-color: #e2e8f0;
            color: #94a3b8;
            border-color: #cbd5e1;
            cursor: not-allowed;
            pointer-events: none;
        }

        .chat-input-bar {
            background-color: #f0f0f0;
            padding: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 18px;
            border: none;
            outline: none;
            font-size: 12px;
        }

        .chat-send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Predefined simulator shortcuts helper */
        .simulator-shortcuts {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 380px;
            justify-content: center;
        }

        .shortcut-btn {
            padding: 6px 10px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
        }

        .shortcut-btn:hover {
            background-color: var(--whatsapp-green);
            color: white;
            border-color: var(--whatsapp-green);
        }
    </style>
</head>
<body>

    <!-- Demo details bar -->
    <div class="demo-bar">
        💻 <strong>Modo Simulación Multiventana:</strong><br>
        Abre el <a class="demo-link" href="dashboard.html" target="_blank">Panel de Control de Recepcionista ➔</a> en otra pestaña para simular el control de handoff y recordatorios en tiempo real.
    </div>

    <!-- Phone mockup framing -->
    <div class="phone-mockup">
        <div class="phone-notch"></div>
        <div class="phone-screen">
            <!-- WhatsApp Header -->
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 8px; margin-top: 10px;">
                    <div class="chat-avatar"></div>
                    <div class="chat-status">
                        <h3>Bot Renacer</h3>
                        <p id="botStatusText">En línea | Agente automático</p>
                    </div>
                </div>
            </div>

            <!-- Chat Message Stream -->
            <div class="chat-messages" id="chatMessageStream">
                <!-- Initial welcoming bubble -->
            </div>

            <!-- Input Bar -->
            <div class="chat-input-bar">
                <input type="text" id="userInputBox" class="chat-input" placeholder="Escribe un mensaje..." onkeypress="handleInputKeyPress(event)">
                <button class="chat-send-btn" onclick="sendCustomMessage()">➔</button>
            </div>
        </div>
    </div>

    <!-- Predefined simulator shortcuts helper -->
    <div class="simulator-shortcuts">
        <button class="shortcut-btn" style="background-color: #fee2e2; color: #991b1b;" onclick="shortcutSend('STOP')">STOP (Opt-out)</button>
        <button class="shortcut-btn" style="background-color: #e2e8f0;" onclick="shortcutSend('AYUDA')">AYUDA (Handoff)</button>
        <button class="shortcut-btn" style="background-color: #d1fae5; color: #065f46;" onclick="shortcutSend('PREFERENCIAS')">PREFERENCIAS</button>
        <button class="shortcut-btn" style="background-color: #f3f4f6;" onclick="shortcutSend('MENÚ')">MENÚ</button>
        <button class="shortcut-btn" style="background-color: #f3f4f6;" onclick="shortcutSend('ATRÁS')">ATRÁS</button>
        <button class="shortcut-btn" style="background-color: #fee2e2; color: #991b1b;" onclick="shortcutSend('CANCELAR')">CANCELAR</button>
        <button class="shortcut-btn" style="background-color: #fef3c7; color: #92400e;" onclick="shortcutSend('REPROGRAMAR')">REPROGRAMAR</button>
        <button class="shortcut-btn" style="background-color: #dbeafe; color: #1e40af;" onclick="shortcutSend('HISTORIAL')">HISTORIAL</button>
    </div>

    <!-- Script Block containing Bot Engine State Machine and Sync -->
    <script>
        // State Machine constants
        const STATES = {
            START: 'START',
            REGISTRATION_CEDULA: 'REGISTRATION_CEDULA',
            REGISTRATION_NAME: 'REGISTRATION_NAME',
            REGISTRATION_LGPD: 'REGISTRATION_LGPD',
            SELECT_SUCURSAL: 'SELECT_SUCURSAL',
            SELECT_SPECIALTY: 'SELECT_SPECIALTY',
            SELECT_DOCTOR: 'SELECT_DOCTOR',
            SELECT_DATE: 'SELECT_DATE',
            SELECT_HOUR: 'SELECT_HOUR',
            CONFIRM_SUMMARY: 'CONFIRM_SUMMARY',
            PAYMENT_INSTRUCTIONS: 'PAYMENT_INSTRUCTIONS',
            CANCELING: 'CANCELING',
            REPROGRAMMING: 'REPROGRAMMING',
            PREFERENCIAS: 'PREFERENCIAS'
        };

        // Temporary session storage
        let session = {
            state: STATES.START,
            history: [],
            phone: '0998765432',
            name: '',
            cedula: '',
            consent: false,
            sucursal: '',
            specialty: '',
            doctor: '',
            date: '',
            hour: '',
            isNew: true,
            isManual: false,
            optOut: false,
            prefPromotions: true,
            prefReminders: true
        };

        // Mock database
        const sucursales = ["Guamaní (Matriz Sur)", "La Arcadia", "Sangolquí"];
        const specialties = ["Ginecología", "Obstetricia", "Medicina General"];
        const doctors = {
            "Ginecología": ["Dra. Lizeth Molina", "Dr. Marcelo Dávila"],
            "Obstetricia": ["Dr. Santiago Rueda"],
            "Medicina General": ["Dra. Carmen Andrade"]
        };

        window.onload = function() {
            // Clean localStorage on load to reset simulation
            localStorage.clear();
            
            // Sync initial state
            updateLocalStorage();

            botReply("🏥 ¡Bienvenido al Centro Médico Renacer! Envía un mensaje o presiona uno de los botones para iniciar.", 
                     ["Agendar Cita", "Consultar Historial", "Cancelar Cita", "Solicitar Asistencia"]);
        };

        // Listen for storage events from the Receptionist Dashboard tab
        window.addEventListener('storage', function(e) {
            if (e.key === 'dashboard_action') {
                const action = JSON.parse(e.newValue);
                if (!action) return;

                if (action.type === 'HANDOFF_MANUAL') {
                    setHandoffMode(true);
                } else if (action.type === 'HANDOFF_BOT') {
                    setHandoffMode(false);
                } else if (action.type === 'HSM_24H') {
                    triggerHSMRecordatory("⏰ [Recordatorio Automático - 24 horas antes]:\nHola María, te recordamos que tienes una cita agendada para mañana a las 08:30 en la sucursal Guamaní con la Dra. Lizeth Molina.\nResponde MENÚ si tienes dudas.", ["MENÚ", "REPROGRAMAR"]);
                } else if (action.type === 'HSM_4H') {
                    triggerHSMRecordatory("⚠️ [Recordatorio Urgente - 4 horas antes]:\nHola María, tu cita médica inicia en 4 horas. Por favor confirma tu asistencia respondiendo SÍ o NO a este mensaje.", ["SÍ", "NO"]);
                } else if (action.type === 'AGENT_REPLY') {
                    // Message written by agent in dashboard
                    addMessage(action.message, true, true);
                }
            }
        });

        function setHandoffMode(isManual) {
            session.isManual = isManual;
            updateLocalStorage();

            if (isManual) {
                document.getElementById("botStatusText").textContent = "En línea | Control de Agente Humano";
                botReply("💬 Recepcionista humana ha tomado control del chat. Hola María, ¿en qué te puedo ayudar?");
            } else {
                document.getElementById("botStatusText").textContent = "En línea | Agente automático";
                botReply("🤖 Recepcionista devolvió el control al asistente virtual. Escribe MENÚ para ver opciones del bot.", ["MENÚ"]);
                session.state = STATES.START;
            }
        }

        function triggerHSMRecordatory(message, buttons) {
            if (session.optOut || !session.prefReminders) {
                console.log("Recordatorio HSM bloqueado por preferencias.");
                return;
            }
            botReply(message, buttons);
        }

        function updateLocalStorage() {
            localStorage.setItem('session_state', JSON.stringify(session));
        }

        function addMessage(text, isIncoming, isAgent = false, buttons = []) {
            const container = document.getElementById("chatMessageStream");
            const bubble = document.createElement("div");
            
            let bubbleClass = "msg msg-in";
            if (!isIncoming) {
                bubbleClass = isAgent ? "msg msg-agent" : "msg msg-out";
            }
            
            bubble.className = bubbleClass;
            
            const now = new Date();
            const timeString = `${now.getHours()}:${now.getMinutes() < 10 ? '0' : ''}${now.getMinutes()}`;
            
            let htmlContent = `${text.replace(/\n/g, '<br>')}`;

            if (isIncoming && buttons && buttons.length > 0) {
                htmlContent += `<div class="chat-btn-container">`;
                buttons.forEach(btnText => {
                    htmlContent += `<button class="chat-interactive-btn" onclick="handleChatButtonClick(this, '${btnText}')">${btnText}</button>`;
                });
                htmlContent += `</div>`;
            }

            htmlContent += `<span class="msg-time">${timeString}</span>`;
            bubble.innerHTML = htmlContent;
            container.appendChild(bubble);
            
            container.scrollTop = container.scrollHeight;

            if (isIncoming && buttons && buttons.length > 0) {
                const oldBtns = container.querySelectorAll(".chat-interactive-btn");
                oldBtns.forEach(btn => {
                    if (btn.parentNode !== bubble.querySelector(".chat-btn-container")) {
                        btn.classList.add("disabled");
                    }
                });
            }

            // Sync with localStorage for Dashboard view
            localStorage.setItem('last_message', JSON.stringify({
                text: text,
                isIncoming: isIncoming,
                isAgent: isAgent,
                timestamp: timeString
            }));
        }

        function handleChatButtonClick(buttonElement, buttonText) {
            buttonElement.classList.add("clicked");
            const siblingButtons = buttonElement.parentNode.querySelectorAll(".chat-interactive-btn");
            siblingButtons.forEach(btn => {
                btn.classList.add("disabled");
            });

            let engineInput = buttonText;
            if (buttonText === "Agendar Cita") engineInput = "1";
            if (buttonText === "Consultar Historial") engineInput = "2";
            if (buttonText === "Cancelar Cita") engineInput = "3";
            if (buttonText === "Solicitar Asistencia") engineInput = "AYUDA";
            
            if (buttonText === "Guamaní (Matriz Sur)") engineInput = "1";
            if (buttonText === "La Arcadia") engineInput = "2";
            if (buttonText === "Sangolquí") engineInput = "3";

            if (buttonText === "Ginecología") engineInput = "1";
            if (buttonText === "Obstetricia") engineInput = "2";
            if (buttonText === "Medicina General") engineInput = "3";

            if (buttonText === "Dra. Lizeth Molina" || buttonText === "Dr. Santiago Rueda") engineInput = "1";
            if (buttonText === "Dr. Marcelo Dávila") engineInput = "2";

            if (buttonText === "Hoy (2026-07-14)") engineInput = "1";
            if (buttonText === "Mañana (2026-07-15)") engineInput = "2";
            if (buttonText === "Próximo lunes (2026-07-20)") engineInput = "3";

            if (buttonText === "08:30") engineInput = "1";
            if (buttonText === "09:30") engineInput = "2";
            if (buttonText === "11:30") engineInput = "3";

            if (buttonText === "Alternar Recordatorios") engineInput = "1";
            if (buttonText === "Alternar Promociones") engineInput = "2";

            processUserMessage(engineInput);
        }

        function handleInputKeyPress(event) {
            if (event.key === 'Enter') {
                sendCustomMessage();
            }
        }

        function sendCustomMessage() {
            const input = document.getElementById("userInputBox");
            const text = input.value.trim();
            if (!text) return;
            
            input.value = "";
            processUserMessage(text);
        }

        function shortcutSend(text) {
            processUserMessage(text);
        }

        function processUserMessage(text) {
            const isManual = session.isManual;
            addMessage(text, false, isManual);

            if (session.isManual) {
                // Pushes the message to the dashboard
                localStorage.setItem('patient_chat_msg', JSON.stringify({
                    text: text,
                    timestamp: new Date().toLocaleTimeString()
                }));
                return;
            }

            // Simulating Latency (RNF-01) - replies in 300ms
            setTimeout(() => {
                engineStep(text);
            }, 300);
        }

        function botReply(text, buttons = []) {
            addMessage(text, true, false, buttons);
        }

        // =========================================
        // CONVERSATIONAL ENGINE STATE MACHINE
        // =========================================
        function engineStep(input) {
            let query = input.toUpperCase().trim();

            if (query === 'STOP') {
                session.optOut = true;
                session.state = STATES.START;
                updateLocalStorage();
                botReply("🚫 Has cancelado la suscripción de mensajería. No recibirás más notificaciones promocionales ni recordatorios. Escribe VOLVER para reactivar.", ["VOLVER"]);
                return;
            }
            
            if (query === 'VOLVER' && session.optOut) {
                session.optOut = false;
                updateLocalStorage();
                botReply("✅ Suscripción reactivada. ¿En qué podemos ayudarte?", ["MENÚ"]);
                return;
            }

            if (query === 'AYUDA') {
                triggerHandoffAlert();
                return;
            }

            if (query === 'CANCELAR') {
                session.state = STATES.CANCELING;
                botReply("❌ Solicitud de Cancelación de Cita:\nEscribe el CÓDIGO de la cita que deseas cancelar:", ["app-1", "app-2"]);
                return;
            }

            if (query === 'REPROGRAMAR') {
                session.state = STATES.REPROGRAMMING;
                botReply("🔄 Solicitud de Reprogramación de Cita:\nEscribe el CÓDIGO de la cita que deseas reprogramar:", ["app-1", "app-2"]);
                return;
            }

            if (query === 'HISTORIAL') {
                botReply("📋 Historial de Citas:\n1. Cita #app-1: 2026-07-15 Ginecología (Confirmada)\n2. Cita #app-2: 2026-07-16 Med. General (Pendiente Pago)", ["MENÚ", "REPROGRAMAR"]);
                return;
            }

            // Intercept navigation and preferences commands (RF-016 & RF-021)
            if (query === 'MENÚ' || query === 'MENU') {
                session.state = STATES.START;
                session.history = [];
                updateLocalStorage();
                botReply("🏠 Volviendo al Menú Principal. Selecciona una opción:", ["Agendar Cita", "Consultar Historial", "Cancelar Cita", "Solicitar Asistencia"]);
                return;
            }

            if (query === 'ATRÁS' || query === 'ATRAS') {
                if (session.history.length > 0) {
                    const prevState = session.history.pop();
                    session.state = prevState;
                    updateLocalStorage();
                    botReply("↩️ Volviendo al paso anterior...");
                    engineStep('ATRAS_TRIGGER');
                } else {
                    botReply("No hay pasos anteriores. Escribe MENÚ para volver al inicio.", ["MENÚ"]);
                }
                return;
            }

            if (query === 'PREFERENCIAS') {
                session.state = STATES.PREFERENCIAS;
                updateLocalStorage();
                botReply(`⚙️ Configuración de Preferencias (RF-021):\n1. Alternar Recordatorios (Activos: ${session.prefReminders ? 'SÍ' : 'NO'})\n2. Alternar Promociones (Activos: ${session.prefPromotions ? 'SÍ' : 'NO'})`, ["Alternar Recordatorios", "Alternar Promociones", "MENÚ"]);
                return;
            }

            // Save state history before transition
            if (query !== 'ATRAS_TRIGGER') {
                session.history.push(session.state);
            } else {
                query = ""; 
            }

            // State Machine Logic
            switch (session.state) {
                case STATES.START:
                    botReply("🏥 Bienvenido al Centro Médico Renacer.\nSelecciona una opción:", ["Agendar Cita", "Consultar Historial", "Cancelar Cita", "Solicitar Asistencia"]);
                    session.state = STATES.REGISTRATION_CEDULA;
                    break;

                case STATES.PREFERENCIAS:
                    if (query === '1') {
                        session.prefReminders = !session.prefReminders;
                        botReply(`⚙️ Preferencia Actualizada: Recordatorios ahora están ${session.prefReminders ? 'HABILITADOS' : 'DESHABILITADOS'}.`, ["MENÚ"]);
                    } else if (query === '2') {
                        session.prefPromotions = !session.prefPromotions;
                        botReply(`⚙️ Preferencia Actualizada: Promociones ahora están ${session.prefPromotions ? 'HABILITADOS' : 'DESHABILITADOS'}.`, ["MENÚ"]);
                    } else {
                        botReply("Opción incorrecta. Selecciona una preferencia para cambiar:", ["Alternar Recordatorios", "Alternar Promociones", "MENÚ"]);
                    }
                    updateLocalStorage();
                    break;

                case STATES.REGISTRATION_CEDULA:
                    if (query === '1') {
                        botReply("Para iniciar el proceso de reserva, necesitamos identificarte.\nPor favor, ingresa tu número de cédula (10 dígitos) o pasaporte:", ["1723456789"]);
                        session.state = STATES.REGISTRATION_NAME;
                    } else if (query === '2') {
                        botReply("📋 Historial de Citas:\n1. Cita #app-1: 2026-07-15 Ginecología (Confirmada)\n2. Cita #app-2: 2026-07-16 Med. General (Pendiente Pago)", ["MENÚ"]);
                        session.state = STATES.START;
                    } else if (query === '3') {
                        engineStep('CANCELAR');
                    } else {
                        botReply("Opción no válida. Por favor, selecciona una opción:", ["Agendar Cita", "Consultar Historial"]);
                    }
                    break;

                case STATES.REGISTRATION_NAME:
                    if (input.length === 10) {
                        session.cedula = input;
                        botReply("Cédula válida detectada. Por favor, ingresa tus nombres y apellidos completos:", ["María Alejandra Pérez"]);
                        session.state = STATES.REGISTRATION_LGPD;
                    } else {
                        botReply("⚠️ Cédula inválida. Debe tener 10 dígitos. Inténtalo de nuevo:", ["1723456789"]);
                    }
                    break;

                case STATES.REGISTRATION_LGPD:
                    session.name = input;
                    botReply(`Consentimiento de Datos Personales:\n¿Aceptas que la clínica guarde tus datos médicos de acuerdo con la LOPDP / LGPD?`, ["SÍ", "NO"]);
                    session.state = STATES.SELECT_SUCURSAL;
                    break;

                case STATES.SELECT_SUCURSAL:
                    if (query === 'SÍ' || query === 'SI') {
                        session.consent = true;
                        botReply("¡Perfecto! Selecciona la sucursal de preferencia:", ["Guamaní (Matriz Sur)", "La Arcadia", "Sangolquí"]);
                        session.state = STATES.SELECT_SPECIALTY;
                    } else {
                        botReply("Lo sentimos, es obligatorio aceptar el consentimiento para procesar tu agendamiento.", ["SÍ", "NO"]);
                    }
                    break;

                case STATES.SELECT_SPECIALTY:
                    const mockSucs = ["Guamaní (Matriz Sur)", "La Arcadia", "Sangolquí"];
                    let selectedSuc = "";
                    if (query === '1' || query === 'GUAMANÍ (MATRIZ SUR)') selectedSuc = mockSucs[0];
                    if (query === '2' || query === 'LA ARCADIA') selectedSuc = mockSucs[1];
                    if (query === '3' || query === 'SANGOLQUÍ') selectedSuc = mockSucs[2];

                    if (selectedSuc) {
                        session.sucursal = selectedSuc;
                        botReply(`Sucursal seleccionada: ${session.sucursal}.\nSelecciona la especialidad de consulta:`, ["Ginecología", "Obstetricia", "Medicina General"]);
                        session.state = STATES.SELECT_DOCTOR;
                    } else {
                        botReply("Opción incorrecta. Selecciona una sucursal:", ["Guamaní (Matriz Sur)", "La Arcadia", "Sangolquí"]);
                    }
                    break;

                case STATES.SELECT_DOCTOR:
                    const mockSpecs = ["Ginecología", "Obstetricia", "Medicina General"];
                    let selectedSpec = "";
                    if (query === '1' || query === 'GINECOLOGÍA') selectedSpec = mockSpecs[0];
                    if (query === '2' || query === 'OBSTETRICIA') selectedSpec = mockSpecs[1];
                    if (query === '3' || query === 'MEDICINA GENERAL') selectedSpec = mockSpecs[2];

                    if (selectedSpec) {
                        session.specialty = selectedSpec;
                        const docs = doctors[session.specialty];
                        botReply(`Especialidad: ${session.specialty}.\nSelecciona tu médico especialista:`, docs);
                        session.state = STATES.SELECT_DATE;
                    } else {
                        botReply("Opción incorrecta. Selecciona la especialidad de consulta:", ["Ginecología", "Obstetricia", "Medicina General"]);
                    }
                    break;

                case STATES.SELECT_DATE:
                    const docsList = doctors[session.specialty];
                    let selectedDoc = "";
                    if (query === '1' || docsList.includes(input)) selectedDoc = docsList[0];
                    if (query === '2' && docsList.length > 1) selectedDoc = docsList[1];

                    if (selectedDoc) {
                        session.doctor = selectedDoc;
                        botReply(`Médico: ${session.doctor}.\nSelecciona una fecha disponible:`, ["Hoy (2026-07-14)", "Mañana (2026-07-15)", "Próximo lunes (2026-07-20)"]);
                        session.state = STATES.SELECT_HOUR;
                    } else {
                        botReply("Opción incorrecta. Selecciona tu médico especialista:", docsList);
                    }
                    break;

                case STATES.SELECT_HOUR:
                    let selectedDate = "";
                    if (query === '1' || query.includes("HOY")) selectedDate = '2026-07-14';
                    if (query === '2' || query.includes("MAÑANA")) selectedDate = '2026-07-15';
                    if (query === '3' || query.includes("LUNES")) selectedDate = '2026-07-20';

                    if (selectedDate) {
                        session.date = selectedDate;
                        botReply(`Fecha: ${session.date}.\nSelecciona el bloque horario de tu preferencia:`, ["08:30", "09:30", "11:30"]);
                        session.state = STATES.CONFIRM_SUMMARY;
                    } else {
                        botReply("Opción incorrecta. Selecciona una fecha:", ["Hoy (2026-07-14)", "Mañana (2026-07-15)", "Próximo lunes (2026-07-20)"]);
                    }
                    break;

                case STATES.CONFIRM_SUMMARY:
                    let selectedHour = "";
                    if (query === '1' || query === "08:30") selectedHour = '08:30';
                    if (query === '2' || query === "09:30") selectedHour = '09:30';
                    if (query === '3' || query === "11:30") selectedHour = '11:30';

                    if (selectedHour) {
                        session.hour = selectedHour;
                        const summary = `📝 Resumen Ejecutivo de Cita:\n• Paciente: ${session.name}\n• Sucursal: ${session.sucursal}\n• Especialidad: ${session.specialty}\n• Médico: ${session.doctor}\n• Fecha y Hora: ${session.date} ${session.hour}\n• Monto Copago: $25.00\n\n¿Los datos son correctos?`;
                        botReply(summary, ["SÍ", "NO"]);
                        session.state = STATES.PAYMENT_INSTRUCTIONS;
                    } else {
                        botReply("Opción incorrecta. Selecciona un bloque horario:", ["08:30", "09:30", "11:30"]);
                    }
                    break;

                case STATES.PAYMENT_INSTRUCTIONS:
                    if (query === 'SÍ' || query === 'SI') {
                        botReply("💾 Guardando cita en base de datos... Estado: PENDIENTE_PAGO.\n\n💳 Instrucciones de Pago:\nPor favor, realiza la transferencia del copago de $25.00 a la cuenta corriente Banco Pichincha #2200112233 a nombre de Centro Médico Renacer. Envía la captura del comprobante por este medio o paga en recepción.", ["MENÚ"]);
                        session.state = STATES.START;
                        
                        // Push log to HSM table on Dashboard
                        localStorage.setItem('hsm_sent_trigger', JSON.stringify({
                            phone: session.phone,
                            template: "instrucciones_pago_copago",
                            timestamp: new Date().toLocaleTimeString()
                        }));
                    } else {
                        botReply("Entendido. Volvamos a la selección de sucursal.", ["Guamaní (Matriz Sur)", "La Arcadia", "Sangolquí"]);
                        session.state = STATES.SELECT_SPECIALTY;
                    }
                    break;

                case STATES.CANCELING:
                    botReply(`Cita ${input} cancelada de forma exitosa. Se ha procedido a reembolsar su dinero (100% reembolso por anticipación >4h).`, ["MENÚ"]);
                    session.state = STATES.START;
                    break;

                case STATES.REPROGRAMMING:
                    botReply(`Cita ${input} seleccionada para reprogramación. Por favor, selecciona la nueva fecha:`, ["Hoy (2026-07-14)", "Mañana (2026-07-15)"]);
                    session.state = STATES.SELECT_HOUR;
                    break;
            }
            updateLocalStorage();
        }

        function triggerHandoffAlert() {
            botReply("⚠️ Transfiriendo chat a una Recepcionista Humana. El Bot automático ha sido pausado. En unos momentos serás atendido.");
            
            // Push alert to dashboard
            localStorage.setItem('handoff_request_alert', JSON.stringify({
                phone: session.phone,
                timestamp: new Date().toLocaleTimeString()
            }));
        }
    </script>
</body>
